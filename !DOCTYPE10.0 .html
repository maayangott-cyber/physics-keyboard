<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Physics Keys Pro</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --danger: #ea4335; --success: #34a853; --warning: #f4b400; }
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: var(--bg); margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; }
        
        /* אזור כתיבה משופר */
        #output { 
            width: 100%; height: 220px; font-size: 1.7rem; padding: 20px; 
            border-radius: 20px; border: 2px solid #e0e0e0; background: white;
            text-align: left; direction: ltr; box-sizing: border-box; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); outline: none; transition: 0.3s;
        }
        #output:focus { border-color: var(--primary); box-shadow: 0 10px 30px rgba(26,115,232,0.1); }

        #smart-guide { width: 100%; background: #fff3cd; color: #856404; padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px solid #ffeeba; text-align: center; font-weight: 500; min-height: 20px; }

        .actions { display: flex; gap: 12px; margin: 20px 0; justify-content: center; width: 100%; flex-wrap: wrap; }
        .btn { padding: 14px 24px; border-radius: 14px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn:active { transform: scale(0.95); }
        
        /* מקלדת מניפה מעוצבת */
        #keyboard-area { position: relative; margin-top: 240px; width: 100px; height: 100px; }
        #math-trigger { 
            width: 100px; height: 100px; background: var(--primary); color: white; 
            border: none; border-radius: 50%; font-weight: bold; font-size: 1.5rem; 
            box-shadow: 0 8px 25px rgba(26,115,232,0.4); cursor: pointer;
        }

        #radial-menu { 
            position: absolute; width: 360px; height: 360px; background: rgba(255, 255, 255, 0.98); 
            border: 2px solid var(--primary); border-radius: 50%; top: -380px; left: 50%; transform: translateX(-50%); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.25); z-index: 1000; display: flex; justify-content: center; align-items: center;
        }
        
        .symbol-node { position: absolute; width: 65px; height: 65px; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 50%; border: 1px solid #eee; font-size: 1.7rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.15s; }
        .symbol-node:active { background: var(--primary); color: white; transform: scale(1.1); }
        
        #close-menu { width: 70px; height: 70px; background: var(--danger); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; font-size: 1.8rem; }
        
        /* פאנל הגדרות */
        #settings-panel { position: fixed; top: 0; right: 0; width: 420px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.2); padding: 25px; z-index: 3000; overflow-y: auto; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); text-align: right; }
        .hidden-panel { transform: translateX(450px); }
        .hidden { display: none !important; }
        
        .bank-section { margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .bank-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 10px; }
        .bank-item { padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 10px; text-align: center; cursor: pointer; font-size: 1.1rem; }
        
        .btn-settings { position: fixed; top: 25px; left: 25px; background: #5f6368; z-index: 2500; padding: 10px 15px; border-radius: 12px; color: white; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <button class="btn-settings" onclick="toggleSettings()">⚙️ בנק סימנים</button>

    <div class="app-container">
        <textarea id="output" placeholder="התחל לכתוב..."></textarea>
        <div id="smart-guide">מוכן. כל שינוי נשמר אוטומטית.</div>

        <div class="actions">
            <button class="btn" style="background: var(--success);" onclick="copyText()">העתק</button>
            <button class="btn" style="background: var(--warning); color: #333;" onclick="jumpToNextField()">הבא ⇥</button>
            <button class="btn" style="background: var(--primary);" onclick="sendAI()">שלח לג'מיני</button>
            <button class="btn" style="background: var(--danger);" onclick="clearOutput()">נקה</button>
        </div>

        <div id="keyboard-area">
            <button id="math-trigger">#+=</button>
            <div id="radial-menu" class="hidden"></div>
        </div>
    </div>

    <div id="settings-panel" class="hidden-panel">
        <h2>בנק סימנים Pro</h2>
        <div id="bank-container"></div>
        <hr>
        <h3>המניפה שלי</h3>
        <div id="my-menu-list"></div>
        <button class="btn" style="background: var(--danger); width: 100%; margin-top: 20px;" onclick="toggleSettings()">סגור</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const menu = document.getElementById('radial-menu');
        const guide = document.getElementById('smart-guide');

        // בנק סימנים מקיף
        const symbolBank = [
            { label: '∫', latex: '\\int_{}^{} ', offset: 5, cat: 'חדו"א', hint: "אינטגרל: גבול תחתון, אז 'הבא'." },
            { label: '∂', latex: '\\frac{\\partial }{\\partial }', offset: 12, cat: 'חדו"א', hint: "נגזרת חלקית: מונה, אז 'הבא'." },
            { label: '∇', latex: '\\nabla ', offset: 0, cat: 'חדו"א', hint: "נבלה." },
            { label: 'sin', latex: '\\sin( )', offset: 2, cat: 'טריגו', hint: "סינוס." },
            { label: 'cos', latex: '\\cos( )', offset: 2, cat: 'טריגו', hint: "קוסינוס." },
            { label: 'ln', latex: '\\ln( )', offset: 2, cat: 'לוג', hint: "לוגריתם טבעי." },
            { label: 'ħ', latex: '\\hbar ', offset: 0, cat: 'פיזיקה', hint: "קבוע פלאנק." },
            { label: '→', latex: '\\vec{}', offset: 1, cat: 'פיזיקה', hint: "וקטור." },
            { label: 'θ', latex: '\\theta ', offset: 0, cat: 'יווניות', hint: "תטא." },
            { label: 'Δ', latex: '\\Delta ', offset: 0, cat: 'יווניות', hint: "דלתא." },
            { label: '÷', latex: '\\frac{}{}', offset: 3, cat: 'בסיסי', hint: "שבר: מונה, אז 'הבא'." },
            { label: '√', latex: '\\sqrt{}', offset: 1, cat: 'בסיסי', hint: "שורש." },
            { label: 'xⁿ', latex: '^{}', offset: 1, cat: 'בסיסי', hint: "חזקה." }
        ];

        // טעינת מידע
        let mySymbols = JSON.parse(localStorage.getItem('userPhysicsMenu')) || symbolBank.slice(0, 8);
        output.value = localStorage.getItem('lastSessionText') || "";

        function save() {
            localStorage.setItem('userPhysicsMenu', JSON.stringify(mySymbols));
            localStorage.setItem('lastSessionText', output.value);
            renderAll();
        }

        output.oninput = () => localStorage.setItem('lastSessionText', output.value);

        function renderRadialMenu() {
            menu.innerHTML = '<div id="close-menu" onclick="event.stopPropagation(); menu.classList.add(\'hidden\')">X</div>';
            mySymbols.forEach((s, i) => {
                const btn = document.createElement('div');
                btn.className = 'symbol-node'; btn.innerText = s.label;
                const angle = (i * (360 / mySymbols.length)) - 90;
                const radius = 145; 
                btn.style.left = (Math.cos(angle * Math.PI / 180) * radius + 147.5) + 'px';
                btn.style.top = (Math.sin(angle * Math.PI / 180) * radius + 147.5) + 'px';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const start = output.selectionStart;
                    output.value = output.value.substring(0, start) + s.latex + output.value.substring(output.selectionEnd);
                    output.focus();
                    output.setSelectionRange(start + s.latex.length - s.offset, start + s.latex.length - s.offset);
                    guide.innerText = s.hint || "הסימן נוסף.";
                    menu.classList.add('hidden');
                    save();
                };
                menu.appendChild(btn);
            });
        }

        function renderBank() {
            const container = document.getElementById('bank-container');
            container.innerHTML = '';
            const categories = [...new Set(symbolBank.map(s => s.cat))];
            categories.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'bank-section'; section.innerHTML = `<strong>${cat}</strong>`;
                const grid = document.createElement('div'); grid.className = 'bank-grid';
                symbolBank.filter(s => s.cat === cat).forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'bank-item'; item.innerText = s.label;
                    item.onclick = () => { if(mySymbols.length < 15) { mySymbols.push(s); save(); } };
                    grid.appendChild(item);
                });
                section.appendChild(grid); container.appendChild(section);
            });
        }

        function renderSettings() {
            const list = document.getElementById('my-menu-list');
            list.innerHTML = '';
            mySymbols.forEach((s, i) => {
                list.innerHTML += `<div class="symbol-item"><span>${s.label}</span><span style="color:red; cursor:pointer;" onclick="removeSymbol(${i})">מחק</span></div>`;
            });
        }

        function jumpToNextField() {
            const text = output.value;
            const cursor = output.selectionStart;
            let next = text.indexOf('{}', cursor);
            if (next === -1) {
                next = text.indexOf('( )', cursor);
                if (next === -1) next = text.indexOf('}', cursor);
                if (next === -1) next = text.indexOf(')', cursor);
            }
            if (next !== -1) {
                output.focus(); output.setSelectionRange(next + 1, next + 1);
                guide.innerText = "שדה בא.";
            } else {
                output.setSelectionRange(text.length, text.length);
                guide.innerText = "סוף.";
            }
        }

        function removeSymbol(index) { mySymbols.splice(index, 1); save(); }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('hidden-panel'); }
        function copyText() { output.select(); document.execCommand('copy'); guide.innerText = "הועתק!"; }
        function sendAI() { window.open(`https://gemini.google.com/app?q=${encodeURIComponent("פתור והסבר בפירוט: " + output.value)}`, '_blank'); }
        function clearOutput() { if(confirm("למחוק?")) { output.value = ""; output.focus(); save(); } }

        document.getElementById('math-trigger').onclick = (e) => { e.stopPropagation(); menu.classList.toggle('hidden'); };
        document.addEventListener('click', () => menu.classList.add('hidden'));
        
        function renderAll() { renderRadialMenu(); renderSettings(); renderBank(); }
        renderAll();
    </script>
</body>
</html>
