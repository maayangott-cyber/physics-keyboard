<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a73e8">
    <link rel="manifest" href="manifest.json">
    
    <title>PhysKeys Pro</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        /* כאן נשאר כל ה-CSS שעיצבנו בגרסה 11 */
        :root { --primary: #1a73e8; --bg: #f8f9fa; --danger: #ea4335; --success: #34a853; --warning: #f4b400; --dark: #3c4043; }
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; background: var(--bg); margin: 0; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 800px; display: flex; flex-direction: column; align-items: center; position: relative; }
        #output { width: 100%; height: 160px; font-size: 1.5rem; padding: 15px; border-radius: 20px 20px 0 0; border: 1px solid #dadce0; background: white; text-align: left; direction: ltr; box-sizing: border-box; outline: none; font-family: 'Consolas', monospace; caret-color: var(--primary); margin: 0; }
        #preview-container { width: 100%; min-height: 90px; background: white; border: 1px solid #dadce0; border-top: none; border-radius: 0 0 20px 20px; display: flex; align-items: center; justify-content: center; padding: 10px; box-sizing: border-box; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow-x: auto; }
        #smart-guide { width: 100%; background: #fff8e1; color: #b45309; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ffecb3; text-align: center; font-weight: 600; direction: rtl; font-size: 0.9rem; }
        .actions { display: flex; gap: 8px; margin-bottom: 20px; justify-content: center; width: 100%; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border-radius: 14px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 3px 5px rgba(0,0,0,0.1); -webkit-tap-highlight-color: transparent; }
        #keyboard-area { position: relative; margin-top: 170px; width: 95px; height: 95px; }
        #math-trigger { width: 95px; height: 95px; background: var(--primary); color: white; border: none; border-radius: 50%; font-weight: bold; font-size: 1.4rem; box-shadow: 0 8px 20px rgba(26,115,232,0.3); cursor: pointer; z-index: 10; }
        #radial-menu { position: absolute; width: 340px; height: 340px; background: rgba(255, 255, 255, 0.98); border: 1px solid #ddd; border-radius: 50%; top: -360px; left: 50%; transform: translateX(-50%); box-shadow: 0 15px 40px rgba(0,0,0,0.1); z-index: 1000; backdrop-filter: blur(4px); }
        .symbol-node { position: absolute; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 50%; border: 1px solid #eee; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        #settings-panel { position: fixed; top: 0; right: 0; width: 380px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.1); padding: 25px; z-index: 4000; overflow-y: auto; transition: 0.3s ease; text-align: right; direction: rtl; }
        .hidden-panel { transform: translateX(100%); }
        .hidden { display: none !important; }
        .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0; }
        .bank-item { padding: 10px 4px; background: #f8f9fa; border: 1px solid #e8eaed; border-radius: 10px; text-align: center; cursor: pointer; }
        .my-menu-list { margin-top: 20px; }
        .menu-item-row { display: flex; justify-content: space-between; align-items: center; background: #f1f3f4; padding: 10px; margin-bottom: 5px; border-radius: 10px; }
        .delete-btn { color: var(--danger); font-weight: bold; cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

    <button style="position:fixed; top:20px; left:20px; background:var(--dark); z-index:3500; padding:10px 15px; border-radius:12px; color:white; border:none; cursor:pointer;" onclick="toggleSettings()">⚙️ Bank</button>

    <div class="app-container">
        <textarea id="output" placeholder="Write physics here..." autofocus></textarea>
        <div id="preview-container"><div id="render-area">Preview...</div></div>
        
        <div id="smart-guide">לחץ על Next כדי לעבור בין [?]</div>
        
        <div class="actions">
            <button class="btn" style="background: var(--success);" onmousedown="event.preventDefault(); copyText()">Copy</button>
            <button class="btn" style="background: var(--warning); color: #333;" onmousedown="event.preventDefault(); jumpToNextField()">Next [?] ⇥</button>
            <button class="btn" style="background: var(--primary);" onmousedown="event.preventDefault(); sendAI()">Send AI</button>
            <button class="btn" style="background: var(--danger);" onmousedown="event.preventDefault(); clearOutput()">Clear</button>
        </div>

        <div id="keyboard-area">
            <button id="math-trigger" onmousedown="event.preventDefault(); toggleMenu()">#+=</button>
            <div id="radial-menu" class="hidden"></div>
        </div>
    </div>

    <div id="settings-panel" class="hidden-panel">
        <h2 style="color:var(--primary)">Bank</h2>
        <div id="bank-container"></div>
        <hr>
        <h3>המניפה שלי</h3>
        <div id="my-menu-list" class="my-menu-list"></div>
        <hr>
        <button class="btn" style="background: var(--danger); width: 100%;" onclick="forceReset()">איפוס עמוק</button>
        <button class="btn" style="background: var(--dark); width: 100%; margin-top:10px;" onclick="toggleSettings()">סגור</button>
    </div>

    <script>
        // PWA Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // כאן מגיע כל ה-JavaScript של גרסה 11 (symbolBank, renderRadialMenu, jumpToNextField וכו')
        // פשוט תעתיק את כל ה-Script מהגרסה האחרונה שלנו לפה
        const output = document.getElementById('output');
        const menu = document.getElementById('radial-menu');
        const guide = document.getElementById('smart-guide');
        const renderArea = document.getElementById('render-area');

        const symbolBank = [
            { label: '∂', latex: '\\frac{\\partial [?]}{\\partial [?]}', cat: 'Calc' },
            { label: '∫', latex: '\\int_{[?]}^{[?]} ', cat: 'Calc' },
            { label: 'dx', latex: 'dx ', cat: 'Calc' },
            { label: 'ħ', latex: '\\hbar ', cat: 'Physics' },
            { label: 'Ψ', latex: '\\Psi ', cat: 'Physics' },
            { label: '÷', latex: '\\frac{[?]}{[?]}', cat: 'Basic' },
            { label: '√', latex: '\\sqrt{[?]}', cat: 'Basic' },
            { label: 'xⁿ', latex: '[?]^{[?]}', cat: 'Basic' },
            { label: 'π', latex: '\\pi ', cat: 'Basic' },
            { label: 'α', latex: '\\alpha ', cat: 'Greek' },
            { label: 'β', latex: '\\beta ', cat: 'Greek' },
            { label: 'γ', latex: '\\gamma ', cat: 'Greek' },
            { label: 'ω', latex: '\\omega ', cat: 'Greek' },
            { label: 'θ', latex: '\\theta ', cat: 'Greek' }
        ];

        let mySymbols = JSON.parse(localStorage.getItem('userPhysicsMenu')) || symbolBank.slice(0, 8);

        function updatePreview() {
            try {
                let cleanText = output.value.replace(/\[\?\]/g, '\\color{blue}{\\Box}');
                window.katex.render(cleanText || '\\text{Preview...}', renderArea, { throwOnError: false, displayMode: true });
            } catch (e) { renderArea.innerText = output.value; }
        }

        output.addEventListener('input', () => {
            output.value = output.value.replace(/[א-ת]/g, '');
            localStorage.setItem('lastSessionText', output.value);
            updatePreview();
        });

        function applySelection(start, end) {
            const run = () => { output.focus(); output.setSelectionRange(start, end); };
            run(); requestAnimationFrame(run); setTimeout(run, 50);
        }

        function jumpToNextField() {
            const val = output.value;
            const target = "[?]";
            let index = val.indexOf(target, output.selectionEnd);
            if (index === -1) index = val.indexOf(target);
            if (index !== -1) { applySelection(index, index + target.length); }
            else { output.focus(); output.setSelectionRange(val.length, val.length); }
        }

        function renderRadialMenu() {
            menu.innerHTML = '';
            mySymbols.forEach((s, i) => {
                const btn = document.createElement('div');
                btn.className = 'symbol-node'; btn.innerText = s.label;
                const angle = (i * (360 / mySymbols.length)) - 90;
                btn.style.left = (Math.cos(angle * Math.PI / 180) * 140 + 140) + 'px';
                btn.style.top = (Math.sin(angle * Math.PI / 180) * 140 + 140) + 'px';
                btn.onmousedown = (e) => {
                    e.preventDefault();
                    output.setRangeText(s.latex, output.selectionStart, output.selectionEnd, 'end');
                    menu.classList.add('hidden');
                    save();
                    const firstNew = output.value.indexOf("[?]", output.selectionStart - s.latex.length);
                    if (firstNew !== -1) applySelection(firstNew, firstNew + 3);
                    updatePreview();
                };
                menu.appendChild(btn);
            });
        }

        function renderBank() {
            const container = document.getElementById('bank-container');
            container.innerHTML = '';
            const cats = [...new Set(symbolBank.map(s => s.cat))];
            cats.forEach(cat => {
                const title = document.createElement('strong'); title.innerText = cat; container.appendChild(title);
                const grid = document.createElement('div'); grid.className = 'bank-grid';
                symbolBank.filter(s => s.cat === cat).forEach(s => {
                    const item = document.createElement('div'); item.className = 'bank-item'; item.innerText = s.label;
                    item.onclick = () => { 
                        if(mySymbols.length < 15 && !mySymbols.find(ms => ms.label === s.label)) {
                            mySymbols.push(s); save(); 
                        }
                    };
                    grid.appendChild(item);
                });
                container.appendChild(grid);
            });
        }

        function renderMySymbolsList() {
            const list = document.getElementById('my-menu-list');
            list.innerHTML = '';
            mySymbols.forEach((s, i) => {
                const row = document.createElement('div');
                row.className = 'menu-item-row';
                row.innerHTML = `<span>${s.label}</span><span class="delete-btn" onclick="removeSymbol(${i})">מחק</span>`;
                list.appendChild(row);
            });
        }

        function removeSymbol(index) { mySymbols.splice(index, 1); save(); }
        function save() { localStorage.setItem('userPhysicsMenu', JSON.stringify(mySymbols)); renderAll(); }
        function forceReset() { if(confirm("אפס הכל?")) { localStorage.clear(); location.reload(); } }
        function copyText() { output.select(); document.execCommand('copy'); }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('hidden-panel'); }
        function toggleMenu() { menu.classList.toggle('hidden'); }
        function clearOutput() { if(confirm("למחוק?")) { output.value = ""; save(); updatePreview(); } }
        function sendAI() { window.open(`https://gemini.google.com/app?q=${encodeURIComponent("Solve: " + output.value)}`, '_blank'); }

        document.addEventListener('mousedown', (e) => { if (!menu.contains(e.target) && e.target.id !== 'math-trigger') menu.classList.add('hidden'); });
        function renderAll() { renderRadialMenu(); renderBank(); renderMySymbolsList(); }
        
        window.onload = () => {
            output.value = localStorage.getItem('lastSessionText') || "";
            renderAll();
            updatePreview();
            output.focus();
        };
    </script>
</body>
</html>
