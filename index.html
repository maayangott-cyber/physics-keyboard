<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Physics Keys Pro</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231a73e8%22/><text x=%2250%%22 y=%2265%%22 font-family=%22serif%22 font-size=%2260%22 fill=%22white%22 text-anchor=%22middle%22>ℏ</text></svg>">
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --danger: #ea4335; --success: #34a853; --warning: #f4b400; }
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: var(--bg); margin: 0; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; position: relative; }
        #output { width: 100%; height: 200px; font-size: 1.7rem; padding: 20px; border-radius: 20px; border: 2px solid #e0e0e0; background: white; text-align: left; direction: ltr; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.05); outline: none; margin-bottom: 10px; }
        #smart-guide { width: 100%; background: #fff3cd; color: #856404; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ffeeba; text-align: center; font-weight: 500; }
        .actions { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; width: 100%; flex-wrap: wrap; }
        .btn { padding: 14px 22px; border-radius: 14px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #history-panel { width: 100%; display: flex; gap: 8px; overflow-x: auto; padding: 5px; margin-bottom: 20px; }
        .hist-item { background: #e8f0fe; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; color: var(--primary); border: 1px solid #c2d7fa; white-space: nowrap; }
        #keyboard-area { position: relative; margin-top: 220px; width: 100px; height: 100px; }
        #math-trigger { width: 100px; height: 100px; background: var(--primary); color: white; border: none; border-radius: 50%; font-weight: bold; font-size: 1.5rem; box-shadow: 0 8px 25px rgba(26,115,232,0.4); cursor: pointer; }
        #radial-menu { position: absolute; width: 360px; height: 360px; background: rgba(255, 255, 255, 0.98); border: 2px solid var(--primary); border-radius: 50%; top: -380px; left: 50%; transform: translateX(-50%); box-shadow: 0 20px 50px rgba(0,0,0,0.25); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .symbol-node { position: absolute; width: 62px; height: 62px; display: flex; justify-content: center; align-items: center; background: #fff; border-radius: 50%; border: 1px solid #eee; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #settings-panel { position: fixed; top: 0; right: 0; width: 380px; height: 100%; background: white; box-shadow: -10px 0 30px rgba(0,0,0,0.2); padding: 25px; z-index: 3000; overflow-y: auto; transition: 0.3s; text-align: right; }
        .hidden-panel { transform: translateX(100%); }
        .hidden { display: none !important; }
        .bank-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .bank-item { padding: 12px 5px; background: #fff; border: 1px solid #ddd; border-radius: 10px; text-align: center; cursor: pointer; font-size: 1rem; }
        .btn-settings { position: fixed; top: 25px; left: 25px; background: #5f6368; z-index: 2500; padding: 10px 15px; border-radius: 12px; color: white; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>
    <button class="btn-settings" onclick="toggleSettings()">⚙️ בנק</button>
    <div class="app-container">
        <textarea id="output" placeholder="התחל לכתוב..."></textarea>
        <div id="history-panel"></div>
        <div id="smart-guide">הוספתי את dx, dy, dz בבנק הסימנים. נסה את הנגזרת כעת.</div>
        <div class="actions">
            <button class="btn" style="background: var(--success);" onclick="copyText()">העתק</button>
            <button class="btn" style="background: var(--warning); color: #333;" onclick="jumpToNextField()">הבא ⇥</button>
            <button class="btn" style="background: var(--primary);" onclick="sendAI()">שלח AI</button>
            <button class="btn" style="background: var(--danger);" onclick="clearOutput()">נקה</button>
        </div>
        <div id="keyboard-area">
            <button id="math-trigger">#+=</button>
            <div id="radial-menu" class="hidden"></div>
        </div>
    </div>
    <div id="settings-panel" class="hidden-panel">
        <h2 style="margin-top:0">בנק סימנים</h2>
        <div id="bank-container"></div>
        <hr>
        <h3>המניפה שלי</h3>
        <div id="my-menu-list"></div>
        <button class="btn" style="background: var(--danger); width: 100%; margin-top: 20px;" onclick="toggleSettings()">סגור</button>
    </div>
    <script>
        const output = document.getElementById('output');
        const menu = document.getElementById('radial-menu');
        const guide = document.getElementById('smart-guide');
        const histPanel = document.getElementById('history-panel');

        const symbolBank = [
            { label: '∂', latex: '\\frac{\\partial {}}{\\partial {}}', offset: 13, cat: 'חדו"א', hint: "נגזרת חלקית: מלא מונה, אז 'הבא'." },
            { label: 'dx', latex: 'dx', offset: 0, cat: 'חדו"א', hint: "דיפרנציאל x." },
            { label: 'dy', latex: 'dy', offset: 0, cat: 'חדו"א', hint: "דיפרנציאל y." },
            { label: 'dz', latex: 'dz', offset: 0, cat: 'חדו"א', hint: "דיפרנציאל z." },
            { label: '∫', latex: '\\int_{}^{} ', offset: 5, cat: 'חדו"א', hint: "אינטגרל." },
            { label: '-', latex: ' - ', offset: 0, cat: 'בסיסי', hint: "מינוס." },
            { label: 'ħ', latex: '\\hbar ', offset: 0, cat: 'פיזיקה', hint: "קבוע פלאנק." },
            { label: 'Ψ', latex: '\\Psi ', offset: 0, cat: 'פיזיקה', hint: "פסי." },
            { label: '√', latex: '\\sqrt{}', offset: 1, cat: 'בסיסי', hint: "שורש." },
            { label: 'xⁿ', latex: '^{}', offset: 1, cat: 'בסיסי', hint: "חזקה." }
        ];

        let mySymbols = JSON.parse(localStorage.getItem('userPhysicsMenu')) || symbolBank.slice(0, 10);
        let history = JSON.parse(localStorage.getItem('physicsHistory')) || [];
        output.value = localStorage.getItem('lastSessionText') || "";

        function save() {
            localStorage.setItem('userPhysicsMenu', JSON.stringify(mySymbols));
            localStorage.setItem('lastSessionText', output.value);
            renderAll();
        }

        // --- מנגנון הדילוג החכם ---
        function jumpToNextField() {
            const text = output.value;
            const cursor = output.selectionStart;
            
            // מחפש את פתח הסוגריים הבא
            let nextBrace = text.indexOf('{', cursor);
            
            if (nextBrace !== -1) {
                // בודק אם מיד אחרי הסוגריים יש מילה טכנית כמו \partial
                let contentAfterBrace = text.substring(nextBrace + 1, nextBrace + 20);
                if (contentAfterBrace.startsWith('\\partial')) {
                    // מדלג מעבר למילה \partial והרווח שאחריה
                    let innerBrace = text.indexOf('{', nextBrace + 1);
                    if (innerBrace !== -1) nextBrace = innerBrace;
                }
                
                output.focus();
                output.setSelectionRange(nextBrace + 1, nextBrace + 1);
                guide.innerText = "נחתת בשדה הבא.";
            } else {
                output.setSelectionRange(text.length, text.length);
                guide.innerText = "סוף הביטוי.";
            }
        }

        function renderRadialMenu() {
            menu.innerHTML = '<div onclick="event.stopPropagation(); menu.classList.add(\'hidden\')" style="width:70px; height:70px; background:var(--danger); color:white; border-radius:50%; display:flex; justify-content:center; align-items:center; font-weight:bold; cursor:pointer; font-size:1.8rem; z-index:1001;">X</div>';
            mySymbols.forEach((s, i) => {
                const btn = document.createElement('div');
                btn.className = 'symbol-node'; btn.innerText = s.label;
                const angle = (i * (360 / mySymbols.length)) - 90;
                btn.style.left = (Math.cos(angle * Math.PI / 180) * 145 + 147.5) + 'px';
                btn.style.top = (Math.sin(angle * Math.PI / 180) * 145 + 147.5) + 'px';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const start = output.selectionStart;
                    output.value = output.value.substring(0, start) + s.latex + output.value.substring(output.selectionEnd);
                    output.focus();
                    output.setSelectionRange(start + s.latex.length - s.offset, start + s.latex.length - s.offset);
                    guide.innerText = s.hint || "הסימן נוסף.";
                    menu.classList.add('hidden');
                    save();
                };
                menu.appendChild(btn);
            });
        }

        function renderHistory() { histPanel.innerHTML = history.map(h => `<div class="hist-item" onclick="useHistory('${h.replace(/'/g, "\\'")}')">${h.substring(0, 15)}...</div>`).join(''); }
        function useHistory(t) { output.value = t; save(); }
        function renderBank() {
            const container = document.getElementById('bank-container');
            container.innerHTML = '';
            [...new Set(symbolBank.map(s => s.cat))].forEach(cat => {
                const grid = document.createElement('div'); grid.className = 'bank-grid';
                symbolBank.filter(s => s.cat === cat).forEach(s => {
                    const item = document.createElement('div'); item.className = 'bank-item'; item.innerText = s.label;
                    item.onclick = () => { if(mySymbols.length < 15) { mySymbols.push(s); save(); } };
                    grid.appendChild(item);
                });
                container.innerHTML += `<strong>${cat}</strong>`; container.appendChild(grid);
            });
        }
        function renderSettings() {
            const list = document.getElementById('my-menu-list');
            list.innerHTML = '';
            mySymbols.forEach((s, i) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; background:#f1f3f4; padding:10px; margin-bottom:5px; border-radius:10px;"><span>${s.label}</span><span style="color:red; cursor:pointer;" onclick="removeSymbol(${i})">מחק</span></div>`;
            });
        }
        function copyText() { 
            output.select(); document.execCommand('copy'); 
            if(output.value && !history.includes(output.value)) { history.unshift(output.value); if(history.length > 5) history.pop(); localStorage.setItem('physicsHistory', JSON.stringify(history)); }
            guide.innerText = "הועתק!"; renderHistory();
        }
        function clearOutput() { if(confirm("למחוק?")) { output.value = ""; save(); } }
        function removeSymbol(i) { mySymbols.splice(i, 1); save(); }
        function toggleSettings() { document.getElementById('settings-panel').classList.toggle('hidden-panel'); }
        function sendAI() { window.open(`https://gemini.google.com/app?q=${encodeURIComponent("פתור והסבר בפירוט: " + output.value)}`, '_blank'); }

        output.oninput = () => localStorage.setItem('lastSessionText', output.value);
        document.getElementById('math-trigger').onclick = (e) => { e.stopPropagation(); menu.classList.toggle('hidden'); };
        document.addEventListener('click', () => menu.classList.add('hidden'));
        function renderAll() { renderRadialMenu(); renderSettings(); renderBank(); renderHistory(); }
        renderAll();
    </script>
</body>
</html>
